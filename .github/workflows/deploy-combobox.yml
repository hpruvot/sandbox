name: Deploy Combobox to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'combobox/**'
      - '.github/workflows/deploy-combobox.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: combobox

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: combobox/package-lock.json

      - run: npm ci

      - name: Build
        env:
          # Sets Vite's `base` to `/<repo-name>/` so assets resolve correctly
          # under https://<user>.github.io/<repo-name>/.
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: combobox/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
